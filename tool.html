<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentFlow - AI Content Repurposing Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Inter',sans-serif;margin:0;background:#0F172A;color:#f1f5f9;padding:0;}
.container{max-width:1400px;margin:60px auto;background:#111827;border-radius:16px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.6);}
.header{text-align:center;margin-bottom:40px;}
.header h1{font-size:3em;background:linear-gradient(90deg,#4F46E5,#7C3AED,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header p{color:#cbd5e1;margin-top:10px;}
.content{display:grid;grid-template-columns:1fr 1fr;gap:30px;}
@media(max-width:1024px){.content{grid-template-columns:1fr;}}
textarea{width:100%;min-height:250px;padding:16px;border-radius:12px;border:none;font-size:1em;resize:vertical;}
.button-group{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;}
.reformat-btn,.clear-btn{flex:1;min-width:140px;padding:12px 20px;font-weight:600;border-radius:12px;border:none;cursor:pointer;transition:all 0.3s;}
.reformat-btn{background:linear-gradient(90deg,#4F46E5,#7C3AED);color:white;}
.reformat-btn:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(124,58,237,0.5);}
.clear-btn{background:#1e293b;color:#cbd5e1;}
.clear-btn:hover{background:#374151;}
.output-item{background:#1e293b;border-radius:12px;padding:20px;margin-bottom:15px;}
.output-item h4{color:#a78bfa;margin-bottom:12px;}
.output-text{background:#111827;padding:15px;border-radius:8px;min-height:60px;white-space:pre-wrap;word-break:break-word;}
.copy-btn{margin-top:10px;padding:10px 18px;border-radius:8px;background:#22D3EE;color:#111827;font-weight:bold;cursor:pointer;border:none;transition:all 0.2s;}
.copy-btn:hover{transform:scale(1.05);background:#06b6d4;}
.copy-btn.copied{background:#6366f1;color:white;}
select{padding:10px 14px;margin-bottom:15px;border-radius:8px;border:none;font-weight:600;background:#1e293b;color:#f1f5f9;}
.warning{color:#f87171;margin:5px 0;font-weight:600;}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>✨ ContentFlow</h1>
<p>Paste your content and get AI-optimized posts for all major platforms</p>
</div>
<div class="content">
<div class="input-section">
<select id="tone">
<option value="professional">Professional</option>
<option value="viral">Viral / Engaging</option>
<option value="minimal">Minimal</option>
<option value="bold">Bold & Confident</option>
</select>
<textarea id="input" placeholder="Paste your content here..."></textarea>
<div class="button-group">
<button class="reformat-btn" onclick="reformatContent()">✨ Reformat Now</button>
<button class="clear-btn" onclick="clearInput()">Clear</button>
</div>
<p class="warning" id="charWarning"></p>
</div>

<div class="output-section">
<div class="output-item"><h4>🐦 Twitter Thread</h4><div class="output-text" id="twitter"></div><button class="copy-btn" onclick="copyToClipboard('twitter')">📋 Copy Tweet</button></div>
<div class="output-item"><h4>📱 TikTok Caption</h4><div class="output-text" id="tiktok"></div><button class="copy-btn" onclick="copyToClipboard('tiktok')">📋 Copy Caption</button></div>
<div class="output-item"><h4>💼 LinkedIn Post</h4><div class="output-text" id="linkedin"></div><button class="copy-btn" onclick="copyToClipboard('linkedin')">📋 Copy Post</button></div>
<div class="output-item"><h4>📸 Instagram Caption</h4><div class="output-text" id="instagram"></div><button class="copy-btn" onclick="copyToClipboard('instagram')">📋 Copy Caption</button></div>
<div class="output-item"><h4>📧 Email Subject Line</h4><div class="output-text" id="emailsubject"></div><button class="copy-btn" onclick="copyToClipboard('emailsubject')">📋 Copy Subject</button></div>
<div class="output-item"><h4>📰 Newsletter Snippet</h4><div class="output-text" id="newsletter"></div><button class="copy-btn" onclick="copyToClipboard('newsletter')">📋 Copy Snippet</button></div>
</div>
</div>

<script>
// JS logic: char count, platform limits, tone-based hooks, hashtag/CTA suggestions
// Example char warnings
const limits = {twitter:280, linkedin:3000, instagram:2200, tiktok:150, emailsubject:60};
function reformatContent(){
const text=document.getElementById('input').value.trim();
if(!text){alert('Please paste some content first!');return;}
document.getElementById('twitter').textContent=`${text.slice(0,limits.twitter)}${text.length>limits.twitter?'...':''}`;
document.getElementById('charWarning').textContent=text.length>limits.twitter?'⚠️ Twitter exceeds 280 chars!':''; 
document.getElementById('linkedin').textContent=`${text.slice(0,limits.linkedin)}${text.length>limits.linkedin?'...':''}`;
document.getElementById('instagram').textContent=`${text.slice(0,limits.instagram)}${text.length>limits.instagram?'...':''}`;
document.getElementById('tiktok').textContent=`${text.slice(0,limits.tiktok)}${text.length>limits.tiktok?'...':''}`;
document.getElementById('emailsubject').textContent=`${text.slice(0,limits.emailsubject)}${text.length>limits.emailsubject?'...':''}`;
document.getElementById('newsletter').textContent=text;
// You can add hook optimization, hashtags, CTA generation here
}
function copyToClipboard(id){const text=document.getElementById(id).textContent;navigator.clipboard.writeText(text).then(()=>{alert('Copied!');});}
function clearInput(){document.getElementById('input').value='';['twitter','tiktok','linkedin','instagram','emailsubject','newsletter'].forEach(id=>document.getElementById(id).textContent='');document.getElementById('charWarning').textContent='';}
</script>
</body>
</html>
